name: Crypto Bot Run
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Python 3.10 par wapas le aaye hain compatible indicators ke liye
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==1.5.3 python-binance
          pip install https://github.com/twopirllc/pandas-ta/archive/refs/heads/main.zip
      - name: Run Script
        run: python main.py
